version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - JWT_SECRET=change_this_customer_secret
      - ADMIN_JWT_SECRET=change_this_admin_secret
      - ADMIN_SEED_EMAIL=superadmin@dlem.mw
      - ADMIN_SEED_PASSWORD=ChangeThisAdminPassword123!
      - SQLITE_DB_PATH=/data/loan_db.sqlite
      - TYPEORM_SYNC=true
    volumes:
      - backend-data:/data
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  backend-data:
